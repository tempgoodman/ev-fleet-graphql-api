services:
  migration_runner:
    build: .
    container_name: ev-fleet-migration-runner
    environment:
      POSTGRES_DB: ev_fleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    container_name: ev-fleet-api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: ev_fleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
      migration_runner:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    container_name: ev-fleet-db
    environment:
      POSTGRES_DB: ev_fleet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ev_fleet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
